<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Configurar Torneo</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 100px; }
        input, button { padding: 10px; font-size: 16px; margin: 10px; }
        .form-group { margin-bottom: 15px; }
    </style>
</head>
<body>
    <h1>Torneo de Tres en Raya</h1>
    <p>Ingresen sus nombres para comenzar la partida local.</p>

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <input type="text" name="player1" placeholder="Nombre Jugador 1 (X)" required>
        </div>
        <div class="form-group">
            <input type="text" name="player2" placeholder="Nombre Jugador 2 (O)" required>
        </div>
        <button type="submit">Comenzar Torneo</button>
    </form>
</body>
</html>
